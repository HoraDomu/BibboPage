name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:

  # ── Create the release ────────────────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: true
          generate_release_notes: false
          body: |
            ## Bibbo ${{ github.ref_name }}

            A native desktop knowledge graph. Write nodes. Connections emerge.

            **No Java required** — the runtime is bundled in the installer.

            ---

            ### Windows

            1. Download **`bibbo-windows.msi`** below
            2. Double-click to install — follow the prompts
            3. Launch Bibbo from the Start Menu

            If Windows Defender shows a warning, click **More info → Run anyway**

            ---

            ### Mac — Apple Silicon (M1 / M2 / M3 / M4)

            1. Download **`bibbo-mac-arm64.dmg`** below
            2. Open the DMG, drag Bibbo to Applications
            3. First launch: right-click → **Open** → **Open** to bypass Gatekeeper

            ---

            ### Mac — Intel

            1. Download **`bibbo-mac-intel.dmg`** below
            2. Open the DMG, drag Bibbo to Applications
            3. First launch: right-click → **Open** → **Open** to bypass Gatekeeper

            ---

            ### Linux

            1. Download **`bibbo-linux.deb`** below
            2. Install: `sudo dpkg -i bibbo-linux.deb`
            3. Launch from your app menu or run `bibbo`

            ---

            **Not sure which Mac you have?** Apple menu → About This Mac.
            M1/M2/M3/M4 → download `arm64`. Intel → download `intel`.

            ---

            Your data is stored locally on your machine. No cloud, no account needed.

  # ── Build all platforms ───────────────────────────────────────────────
  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: bibbo-windows.msi

          - os: macos-latest
            asset: bibbo-mac-arm64.dmg

          - os: macos-13
            asset: bibbo-mac-intel.dmg

          - os: ubuntu-latest
            asset: bibbo-linux.deb

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java + JavaFX (Liberica Full JDK)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'liberica'
          java-package: 'jdk+fx'

      - name: Make gradlew executable
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Build distribution
        shell: bash
        run: ./gradlew installDist

      - name: Prepare jpackage input
        shell: bash
        run: |
          # Liberica JDK already has JavaFX as built-in modules.
          # Strip Maven JavaFX JARs from the input so jpackage doesn't
          # see them twice and hit module conflicts at bundle time.
          mkdir -p build/jpackage-input
          for jar in build/install/bibbo/lib/*.jar; do
            name=$(basename "$jar")
            case "$name" in
              javafx-*) ;;  # skip — already in bundled JDK
              *) cp "$jar" build/jpackage-input/ ;;
            esac
          done

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          MAIN_JAR=$(basename build/install/bibbo/lib/bibbo-*.jar)
          "$JAVA_HOME/bin/jpackage" \
            --input build/jpackage-input \
            --main-jar "$MAIN_JAR" \
            --main-class com.bibbo.Main \
            --name Bibbo \
            --app-version "$VERSION" \
            --type msi \
            --dest build/dist \
            --win-dir-chooser \
            --win-shortcut \
            --win-menu

      - name: Package (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          MAIN_JAR=$(basename build/install/bibbo/lib/bibbo-*.jar)
          # macOS CFBundleShortVersionString requires first component >= 1
          if [[ "${VERSION%%.*}" == "0" ]]; then
            PKG_VERSION="1.${VERSION#*.}"
          else
            PKG_VERSION="$VERSION"
          fi
          "$JAVA_HOME/bin/jpackage" \
            --input build/jpackage-input \
            --main-jar "$MAIN_JAR" \
            --main-class com.bibbo.Main \
            --name Bibbo \
            --app-version "$PKG_VERSION" \
            --type dmg \
            --dest build/dist

      - name: Package (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          MAIN_JAR=$(basename build/install/bibbo/lib/bibbo-*.jar)
          "$JAVA_HOME/bin/jpackage" \
            --input build/jpackage-input \
            --main-jar "$MAIN_JAR" \
            --main-class com.bibbo.Main \
            --name Bibbo \
            --app-version "$VERSION" \
            --type deb \
            --dest build/dist \
            --linux-shortcut

      - name: Rename artifact
        shell: bash
        run: |
          cd build/dist
          # Find whatever jpackage produced (name format varies by OS/version)
          # and copy it to the expected asset name for the release.
          BUILT=$(ls *.msi *.dmg *.deb *.rpm 2>/dev/null | head -1)
          echo "Built: $BUILT"
          cp "$BUILT" "${{ matrix.asset }}"

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: build/dist/${{ matrix.asset }}
